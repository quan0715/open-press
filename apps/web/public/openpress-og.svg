<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">OpenPress social preview</title>
  <desc id="desc">OpenPress preview graphic for AI-first serious document workspaces.</desc>
  <defs>
    <pattern id="grid" width="72" height="72" patternUnits="userSpaceOnUse">
      <path d="M72 0H0V72" fill="none" stroke="#cbd4cf" stroke-width="1"/>
