name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# ============================================================================
# ⚠️ Node version is pinned to 24 — DO NOT lower without reading docs/migrations/0.5.0.md.
# Node 22 ships npm 10.x; Trusted Publishing OIDC needs npm 11.5.1+ (in Node 24).
# CI and Release both run on Node 24 so they match. Lowering breaks `release.yml`.
# ============================================================================

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          # ⚠️ Pinned: see top-of-file warning. Lowering breaks release.yml OIDC publish.
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Debug — symlink targets
        run: |
          echo "::group::resolved @types/node"
          readlink -f packages/core/node_modules/@types/node 2>&1 || true
          ls -la "$(readlink -f packages/core/node_modules/@types/node)/index.d.ts" 2>&1 || echo "no index.d.ts"
          echo "::endgroup::"
          echo "::group::resolved vite"
          readlink -f packages/core/node_modules/vite 2>&1 || true
          ls "$(readlink -f packages/core/node_modules/vite)/client.d.ts" 2>&1 || echo "no client.d.ts"
          echo "::endgroup::"
          echo "::group::node resolve test"
          cd packages/core
          node -e "console.log(require.resolve('@types/node/package.json'))" 2>&1 || echo "FAILED"
          node -e "console.log(require.resolve('vite/client.d.ts'))" 2>&1 || echo "FAILED"
          node -e "console.log(require.resolve('typescript/package.json'))" 2>&1 || echo "FAILED"
          echo "::endgroup::"

      - name: Install Chromium for pagination measurement
        run: pnpm --filter @open-press/core exec playwright install --with-deps chromium

      - name: Typecheck
        run: pnpm --filter @open-press/core typecheck

      - name: Unit tests
        run: pnpm --filter @open-press/core test

      - name: Build CLI
        run: pnpm --filter @open-press/cli build

      - name: Build landing site
        run: pnpm --filter web build
