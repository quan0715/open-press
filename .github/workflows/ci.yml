name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# ============================================================================
# ⚠️ Node version is pinned to 24 — DO NOT lower without reading docs/migrations/0.5.0.md.
# Node 22 ships npm 10.x; Trusted Publishing OIDC needs npm 11.5.1+ (in Node 24).
# CI and Release both run on Node 24 so they match. Lowering breaks `release.yml`.
# ============================================================================

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          # ⚠️ Pinned: see top-of-file warning. Lowering breaks release.yml OIDC publish.
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Chromium for pagination measurement
        run: pnpm --filter @open-press/core exec playwright install --with-deps chromium

      - name: Typecheck
        run: pnpm --filter @open-press/core typecheck

      - name: Unit tests
        run: pnpm --filter @open-press/core test

      - name: Build CLI
        run: pnpm --filter @open-press/cli build

      - name: Build landing site
        run: pnpm --filter web build

  pack-smoke:
    runs-on: ubuntu-latest
    needs: test

    strategy:
      fail-fast: false
      matrix:
        pack: [editorial-monograph, claude-document, academic-paper, social-post, slide-deck]

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          # ⚠️ Pinned: see top-of-file warning. Lowering breaks release.yml OIDC publish.
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Chromium for pagination measurement
        run: pnpm --filter @open-press/core exec playwright install --with-deps chromium

      - name: Build CLI (syncs template)
        run: pnpm --filter @open-press/cli build

      - name: Init test workspace from cli
        run: node packages/cli/dist/cli.js init /tmp/smoke-${{ matrix.pack }} --pack ${{ matrix.pack }} --no-install --no-git

      - name: Install scaffolded workspace
        run: cd /tmp/smoke-${{ matrix.pack }} && npm install

      - name: Validate scaffolded workspace
        run: cd /tmp/smoke-${{ matrix.pack }} && npm run openpress:validate

      - name: Render scaffolded workspace
        run: cd /tmp/smoke-${{ matrix.pack }} && npm run openpress:render
