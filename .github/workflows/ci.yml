name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Chromium for pagination measurement
        run: pnpm exec playwright install --with-deps chromium

      - name: Typecheck
        run: pnpm --filter @open-press/core typecheck

      - name: Unit tests
        run: pnpm --filter @open-press/core test

      - name: Build CLI
        run: pnpm --filter @open-press/cli build

      - name: Build landing site
        run: pnpm --filter web build

  pack-smoke:
    runs-on: ubuntu-latest
    needs: test

    strategy:
      fail-fast: false
      matrix:
        pack: [editorial-monograph, claude-document]

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Chromium for pagination measurement
        run: pnpm exec playwright install --with-deps chromium

      - name: Build CLI (syncs template)
        run: pnpm --filter @open-press/cli build

      - name: Init test workspace from cli
        run: node packages/cli/dist/cli.js init /tmp/smoke-${{ matrix.pack }} --pack ${{ matrix.pack }} --no-install --no-git

      - name: Install scaffolded workspace
        run: cd /tmp/smoke-${{ matrix.pack }} && npm install

      - name: Validate scaffolded workspace
        run: cd /tmp/smoke-${{ matrix.pack }} && npm run openpress:validate

      - name: Render scaffolded workspace
        run: cd /tmp/smoke-${{ matrix.pack }} && npm run openpress:render
